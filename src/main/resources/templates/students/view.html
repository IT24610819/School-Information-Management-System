<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-info text-white">
            <h3 class="mb-0">Student Profile</h3>
        </div>

        <div class="card-body">

            <div class="text-center mb-4">
                <img th:if="${student.photoPath != null and !#strings.isEmpty(student.photoPath)}"
                     th:src="@{/uploads/{file}(file=${student.photoPath})}"
                     alt="Student Photo"
                     class="img-thumbnail rounded"
                     style="width: 180px; height: 180px; object-fit: cover;">

                <img th:if="${student.photoPath == null or #strings.isEmpty(student.photoPath)}"
                     th:src="@{/images/default_student.png}"
                     alt="Default Student Photo"
                     class="img-thumbnail rounded"
                     style="width: 180px; height: 180px; object-fit: cover;">
            </div>

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-bold">Admission Number</label>
                    <div class="form-control bg-light" th:text="${student.admissionNo}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Full Name</label>
                    <div class="form-control bg-light" th:text="${student.fullName}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">First Name</label>
                    <div class="form-control bg-light" th:text="${student.firstName}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Last Name</label>
                    <div class="form-control bg-light" th:text="${student.lastName}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Date of Birth</label>
                    <div class="form-control bg-light" th:text="${student.dateOfBirth}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Gender</label>
                    <div class="form-control bg-light" th:text="${student.gender}"></div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">Address</label>
                    <div class="form-control bg-light" th:text="${student.address}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Guardian Name</label>
                    <div class="form-control bg-light" th:text="${student.guardianName}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Guardian Contact</label>
                    <div class="form-control bg-light" th:text="${student.guardianContact}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Guardian Email</label>
                    <div class="form-control bg-light" th:text="${student.guardianEmail != null ? student.guardianEmail : 'N/A'}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Class</label>
                    <div class="form-control bg-light" th:text="${student.classRoom.className}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Admission Date</label>
                    <div class="form-control bg-light" th:text="${student.admissionDate}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Status</label>
                    <div class="form-control bg-light">
                        <span th:if="${student.status == 'Active'}" class="badge bg-success">Active</span>
                        <span th:if="${student.status == 'Inactive'}" class="badge bg-secondary">Inactive</span>
                        <span th:if="${student.status == 'Transferred'}" class="badge bg-dark">Transferred</span>
                    </div>
                </div>

            </div>

            <div class="mt-4">
                <a href="/students" class="btn btn-secondary">Back</a>
                <a th:href="@{/students/edit/{id}(id=${student.studentId})}" class="btn btn-warning">Edit</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
