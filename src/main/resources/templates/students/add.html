<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Add New Student</h4>
        </div>

        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/students}" th:object="${student}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Admission Number</label>
                    <input type="text" th:field="*{admissionNo}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('admissionNo')}" th:errors="*{admissionNo}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" th:field="*{dateOfBirth}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select th:field="*{gender}" class="form-select">
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" th:field="*{address}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Guardian Name</label>
                    <input type="text" th:field="*{guardianName}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('guardianName')}" th:errors="*{guardianName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Guardian Contact</label>
                    <input type="text" th:field="*{guardianContact}" class="form-control" placeholder="0771234567 or +94771234567">
                    <div class="text-danger small" th:if="${#fields.hasErrors('guardianContact')}" th:errors="*{guardianContact}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Guardian Email</label>
                    <input type="email" th:field="*{guardianEmail}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('guardianEmail')}" th:errors="*{guardianEmail}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Class</label>
                    <select name="classId" class="form-select" required>
                        <option value="">-- Select Class --</option>
                        <option th:each="c : ${classes}"
                                th:value="${c.classId}"
                                th:text="${c.className}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Admission Date</label>
                    <input type="date" th:field="*{admissionDate}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('admissionDate')}" th:errors="*{admissionDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="">-- Select Status --</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Transferred">Transferred</option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Student Photo</label>
                    <input type="file" name="photoFile" class="form-control" accept="image/*">
                </div>

                <button type="submit" class="btn btn-success">Save Student</button>
                <a href="/students" class="btn btn-secondary">Back</a>
            </form>

        </div>
    </div>
</div>

</body>
</html>
